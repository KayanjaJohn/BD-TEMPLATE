<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! 🎉</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Montserrat', sans-serif; }

        #canvas-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }

        #video-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 0; opacity: 0.35;
            transform-origin: 50% 50%;
            animation: bgZoom 22s ease-in-out infinite alternate, bgDrift 40s ease-in-out infinite alternate;
            filter: saturate(1.15) contrast(1.05) brightness(0.95);
            will-change: transform, filter;
        }
        @keyframes bgZoom {
            0%   { transform: scale(1.05) translate3d(0,0,0); filter: saturate(1.10) contrast(1.02) brightness(0.92); }
            50%  { transform: scale(1.18) translate3d(-1%, 0.5%, 0); filter: saturate(1.20) contrast(1.08) brightness(1.00); }
            100% { transform: scale(1.32) translate3d(1%, -0.5%, 0); filter: saturate(1.15) contrast(1.05) brightness(0.95); }
        }
        @keyframes bgDrift {
            0%   { transform-origin: 45% 55%; }
            100% { transform-origin: 55% 45%; }
        }

        /* Luxurious vignette with warm gold tones */
        #vignette {
            position: fixed; inset: 0; z-index: 2; pointer-events: none;
            background:
              radial-gradient(ellipse at 50% 45%, rgba(0,0,0,0) 25%, rgba(0,0,0,0.50) 70%, rgba(0,0,0,0.88) 100%),
              radial-gradient(circle at 20% 20%, rgba(184, 134, 11, 0.12), transparent 50%),
              radial-gradient(circle at 80% 80%, rgba(218, 165, 32, 0.10), transparent 55%),
              radial-gradient(circle at 50% 50%, rgba(139, 0, 139, 0.06), transparent 60%);
            mix-blend-mode: normal;
        }
        /* Premium film grain */
        #grain {
            position: fixed; inset: 0; z-index: 3; pointer-events: none;
            opacity: 0.05; mix-blend-mode: overlay;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
        }

        #ui-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            perspective: 1400px;
        }
        #ui-tilt {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(.2,.7,.2,1);
            will-change: transform;
        }

        /* Luxurious gold text effect */
        .birthday-text {
            font-size: clamp(2.8rem, 8vw, 7rem); font-weight: 900;
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, 
                #FFF8DC 0%, 
                #DAA520 15%, 
                #FFD700 30%, 
                #FFF8DC 45%, 
                #DAA520 60%, 
                #FFD700 75%, 
                #FFF8DC 100%);
            background-size: 400% 400%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            animation: goldShift 4s ease infinite, float 3s ease-in-out infinite;
            filter: 
                drop-shadow(0 2px 0 rgba(0,0,0,0.5)) 
                drop-shadow(0 8px 30px rgba(218, 165, 32, 0.4)) 
                drop-shadow(0 0 60px rgba(255, 215, 0, 0.25))
                drop-shadow(0 0 120px rgba(218, 165, 32, 0.15));
            letter-spacing: 0.15em; text-align: center; line-height: 1.15;
            transform: translateZ(60px);
            will-change: transform, background-position;
            text-transform: uppercase;
        }

        /* Premium name with multi-layer gold effect */
        .birthday-name {
            font-size: clamp(4rem, 12vw, 11rem); font-weight: 700;
            font-family: 'Playfair Display', serif; font-style: italic;
            background: linear-gradient(45deg, 
                #FAFFF9, 
                #DAA520, 
                #FFD700, 
                #FFF8DC, 
                #DAA520, 
                #FAFFF9);
            background-size: 500% 500%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            animation: goldShift 5s ease-in-out infinite, float 5s ease-in-out infinite, nameGlow 6s ease-in-out infinite;
            text-align: center; line-height: 1.05;
            filter:
              drop-shadow(2px 3px 0 rgba(5,21,23,0.55))
              drop-shadow(6px 10px 0 rgba(5,21,23,0.28))
              drop-shadow(0 20px 45px rgba(218, 165, 32, 0.45))
              drop-shadow(0 0 80px rgba(255, 215, 0, 0.30))
              drop-shadow(0 0 150px rgba(218, 165, 32, 0.15));
            transform: translateZ(110px);
            will-change: transform, background-position, filter;
            letter-spacing: 0.08em;
        }
        @keyframes nameGlow {
            0%,100% { filter: drop-shadow(2px 3px 0 rgba(5,21,23,0.55)) drop-shadow(6px 10px 0 rgba(5,21,23,0.28)) drop-shadow(0 20px 45px rgba(218, 165, 32, 0.45)) drop-shadow(0 0 80px rgba(255, 215, 0, 0.30)) drop-shadow(0 0 150px rgba(218, 165, 32, 0.15)); }
            50%     { filter: drop-shadow(2px 3px 0 rgba(5,21,23,0.55)) drop-shadow(6px 10px 0 rgba(5,21,23,0.28)) drop-shadow(0 25px 60px rgba(255, 215, 0, 0.55)) drop-shadow(0 0 110px rgba(255, 215, 0, 0.40)) drop-shadow(0 0 180px rgba(218, 165, 32, 0.25)); }
        }

        /* Elegant subtitle */
        .sub-text {
            font-size: clamp(1.1rem, 2.5vw, 2.2rem); color: #FFF8DC; margin-top: 1.5rem;
            text-shadow: 
                0 2px 0 rgba(0,0,0,0.45), 
                0 0 20px rgba(218, 165, 32, 0.8), 
                0 0 40px rgba(218, 165, 32, 0.35),
                0 0 80px rgba(255, 215, 0, 0.15);
            animation: pulse 2s ease-in-out infinite;
            font-weight: 300; letter-spacing: 0.25em;
            transform: translateZ(30px);
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
        }

        /* Divider line */
        .luxury-divider {
            width: 120px; height: 2px;
            background: linear-gradient(90deg, transparent, #DAA520, #FFD700, #DAA520, transparent);
            margin: 1.5rem auto;
            opacity: 0.7;
            animation: pulse 3s ease-in-out infinite;
            transform: translateZ(40px);
        }

        @keyframes goldShift {
            0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; }
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        @keyframes pulse { 0%, 100% { opacity: 0.8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }

        /* Luxury start overlay */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.88); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: opacity 0.8s ease;
        }
        #start-overlay.hidden { opacity: 0; pointer-events: none; }

        .start-btn {
            width: 140px; height: 140px; border-radius: 50%;
            background: linear-gradient(135deg, #DAA520 0%, #FFD700 30%, #FFF8DC 50%, #DAA520 70%, #B8860B 100%);
            background-size: 200% 200%;
            display: flex; align-items: center; justify-content: center;
            font-size: 3.5rem; color: #1a1a1a;
            box-shadow: 
                0 0 40px rgba(218, 165, 32, 0.5),
                0 0 80px rgba(255, 215, 0, 0.3),
                0 0 120px rgba(218, 165, 32, 0.15),
                inset 0 0 30px rgba(255,255,255,0.3);
            animation: goldPulse 2s ease-in-out infinite;
            border: 3px solid rgba(255, 248, 220, 0.4);
            position: relative;
            overflow: hidden;
        }
        .start-btn::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.4) 50%, transparent 70%);
            animation: shimmer 3s ease-in-out infinite;
        }
        @keyframes goldPulse {
            0%, 100% { box-shadow: 0 0 40px rgba(218, 165, 32, 0.5), 0 0 80px rgba(255, 215, 0, 0.3), 0 0 120px rgba(218, 165, 32, 0.15), inset 0 0 30px rgba(255,255,255,0.3); }
            50% { box-shadow: 0 0 60px rgba(218, 165, 32, 0.7), 0 0 100px rgba(255, 215, 0, 0.45), 0 0 160px rgba(218, 165, 32, 0.25), inset 0 0 40px rgba(255,255,255,0.4); }
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }
        .start-text { 
            color: #FFF8DC; margin-top: 2.5rem; font-size: 1.3rem; 
            letter-spacing: 0.3em; text-transform: uppercase;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            text-shadow: 0 0 20px rgba(218, 165, 32, 0.5);
        }
        .start-sub { 
            color: rgba(218, 165, 32, 0.6); margin-top: 0.8rem; 
            font-size: 0.9rem; letter-spacing: 0.2em;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
        }

        /* Premium controls */
        #controls {
            position: fixed; bottom: 24px; right: 24px; z-index: 20;
            display: flex; gap: 12px;
        }
        .control-btn {
            width: 56px; height: 56px; border-radius: 50%;
            background: linear-gradient(135deg, rgba(218,165,32,0.18), rgba(218,165,32,0.05));
            backdrop-filter: blur(16px) saturate(1.4);
            -webkit-backdrop-filter: blur(16px) saturate(1.4);
            border: 1px solid rgba(218, 165, 32, 0.35); color: #FFF8DC;
            font-size: 1.3rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.35s cubic-bezier(.2,.7,.2,1), background 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 
                0 8px 24px rgba(0,0,0,0.35), 
                inset 0 1px 0 rgba(255,248,220,0.2),
                0 0 20px rgba(218, 165, 32, 0.1);
        }
        .control-btn:hover { 
            background: linear-gradient(135deg, rgba(218,165,32,0.35), rgba(218,165,32,0.12)); 
            transform: translateY(-3px) scale(1.1); 
            box-shadow: 
                0 14px 30px rgba(0,0,0,0.45), 
                inset 0 1px 0 rgba(255,248,220,0.3),
                0 0 30px rgba(218, 165, 32, 0.25);
            border-color: rgba(255, 215, 0, 0.5);
        }
        .control-btn:active { transform: translateY(0) scale(0.96); }

        .confetti-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 5;
        }

        .emoji-float {
            position: fixed; font-size: 2rem; pointer-events: none; z-index: 15;
            animation: emojiFloat 4s ease-in forwards;
        }
        @keyframes emojiFloat {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
        }

        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); z-index: 200;
            display: none; flex-direction: column;
            align-items: center; justify-content: center; color: #FFF8DC;
            transition: opacity 0.5s;
        }
        .loading-overlay.visible { display: flex; }
        .loading-overlay.hidden { opacity: 0; pointer-events: none; }
        .spinner {
            width: 60px; height: 60px;
            border: 3px solid rgba(218,165,32,0.15);
            border-top-color: #DAA520; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(218, 165, 32, 0.3);
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { 
            font-size: 1.1rem; letter-spacing: 0.15em; 
            font-family: 'Cormorant Garamond', serif;
            color: #DAA520;
        }
        .loading-progress { margin-top: 10px; font-size: 0.85rem; color: rgba(218,165,32,0.5); }

        /* Floating particles for extra luxury */
        .particle {
            position: fixed; pointer-events: none; z-index: 4;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,215,0,0.8), rgba(218,165,32,0.2), transparent);
            animation: particleFloat linear infinite;
        }
        @keyframes particleFloat {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
    </style>
<base target="_blank">
</head>
<body>

    <video id="video-bg" loop muted playsinline>
        <source src="https://assets.mixkit.co/videos/preview/mixkit-stars-in-space-1610-large.mp4" type="video/mp4">
    </video>

    <div id="canvas-container"></div>
    <canvas class="confetti-canvas" id="confetti"></canvas>

    <div id="vignette"></div>
    <div id="grain"></div>
    <div id="ui-layer">
      <div id="ui-tilt">
        <div class="birthday-text">Happy<br>Birthday</div>
        <div class="luxury-divider"></div>
        <div class="birthday-name">KING</div>
        <div class="sub-text">17th of July is your day</div>
        <div class="luxury-divider"></div>
        <div class="sub-text">to amplify your life</div>
        <div class="sub-text" style="font-size: clamp(0.9rem, 2vw, 1.6rem); margin-top: 0.8rem; opacity: 0.7;">Make a wish ✨</div>
      </div>
    </div>

    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
        <div class="loading-text">Loading birthday magic...</div>
        <div class="loading-progress" id="load-progress">0 / 8 images</div>
    </div>

    <div id="start-overlay" onclick="startExperience()">
        <div class="start-btn">🎂</div>
        <div class="start-text">Tap to Celebrate</div>
        <div class="start-sub">A special moment awaits</div>
    </div>

    <div id="controls">
        <button class="control-btn" onclick="toggleMusic()" title="Toggle Music">🎵</button>
        <button class="control-btn" onclick="toggleVideo()" title="Toggle Video">🎬</button>
        <button class="control-btn" onclick="burstConfetti()" title="More Confetti!">🎉</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const DEFAULT_VIDEO_URL = "https://assets.mixkit.co/videos/preview/mixkit-stars-in-space-1610-large.mp4";
        const CUSTOM_VIDEO_URL = "video.mp4";

        // Luxurious card images and labels
        const CARD_IMAGES = [
            "img9.png", "img3.png", "img2.png", "img4.png",
            "img6.png", "img5.png", "img8.png", "img7.png", "img1.png"
        ];

        const CARD_LABELS = [
            'Sweet Moments', 'Party Time', 'Make a Wish', 'Celebrate Life',
            'Joy & Laughter', 'Special Day', 'Dream Big', 'Love & Happiness', 'The Star'
        ];

        // Premium gold and jewel tones
        const CARD_COLORS = [
            '#DAA520', '#B8860B', '#CD853F', '#D2691E',
            '#8B4513', '#A0522D', '#BC8F8F', '#F4A460', '#DAA520'
        ];

        const SUN_SIZE = 3.8;
        const SUN_SPEED = 0.003;
        const CARD_WIDTH = 3.5;
        const CARD_HEIGHT = 3.85;
        const ORBIT_SPEED = 0.028;
        const BOB_SPEED = 1.0;
        const BOB_HEIGHT = 0.4;
        const CAMERA_SPEED = 0.12;
        const STAR_SPEED = 0.0002;

        // ==================== AUDIO ====================
        let audioCtx, musicPlaying = false, musicInterval;

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playTone(freq, dur, vol) {
            if (!audioCtx) return;
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = 'sine';
            o.frequency.value = freq;
            g.gain.setValueAtTime(0, audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.5);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + dur);
        }

        function playPluck(freq, delay, vol) {
            if (!audioCtx) return;
            setTimeout(() => {
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.type = 'triangle';
                o.frequency.value = freq;
                g.gain.setValueAtTime(vol, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(); o.stop(audioCtx.currentTime + 1.2);
            }, delay);
        }

        const CHORDS = [
            { name: "G",  notes: [196.00, 246.94, 293.66] },
            { name: "Dm", notes: [293.66, 349.23, 440.00] },
            { name: "F",  notes: [174.61, 220.00, 261.63] },
            { name: "C",  notes: [261.63, 329.63, 392.00] },
            { name: "G",  notes: [196.00, 246.94, 293.66] },
            { name: "Dm", notes: [293.66, 349.23, 440.00] },
            { name: "F",  notes: [174.61, 220.00, 261.63] },
            { name: "Am", notes: [220.00, 261.63, 329.63] }
        ];

        function startMusic() {
            if (musicPlaying) return;
            musicPlaying = true;
            let chordIndex = 0;
            CHORDS[0].notes.forEach((f, i) => {
                playTone(f, 3.0, 0.05);
                playPluck(f, i * 40, 0.04);
            });
            musicInterval = setInterval(() => {
                if (!musicPlaying) return;
                chordIndex = (chordIndex + 1) % CHORDS.length;
                const chord = CHORDS[chordIndex];
                chord.notes.forEach((f, i) => {
                    setTimeout(() => playTone(f, 3.0, 0.05), i * 50);
                });
                chord.notes.forEach((f, i) => {
                    setTimeout(() => playPluck(f, i * 30, 0.035), i * 30);
                });
                if (chord.name === "G" || chord.name === "C") {
                    const sparkle = chord.name === "G" ? 783.99 : 523.25;
                    setTimeout(() => playPluck(sparkle, 0, 0.025), 400);
                }
            }, 2800);
        }

        function stopMusic() { musicPlaying = false; clearInterval(musicInterval); }

        function toggleMusic() {
            if (musicPlaying) stopMusic();
            else { if (!audioCtx) initAudio(); startMusic(); }
        }

        // ==================== VIDEO TOGGLE ====================
        let usingCustomVideo = false;
        const videoEl = document.getElementById('video-bg');

        function toggleVideo() {
            if (CUSTOM_VIDEO_URL === "YOUR_VIDEO_HERE.mp4" || !CUSTOM_VIDEO_URL) {
                videoEl.paused ? videoEl.play() : videoEl.pause();
                return;
            }
            usingCustomVideo = !usingCustomVideo;
            const src = videoEl.querySelector('source');
            if (usingCustomVideo) {
                src.src = CUSTOM_VIDEO_URL;
                videoEl.load();
                videoEl.muted = true;
                videoEl.loop = true;
                videoEl.play().catch(() => {});
            } else {
                src.src = DEFAULT_VIDEO_URL;
                videoEl.load();
                videoEl.muted = true;
                videoEl.loop = true;
                videoEl.play().catch(() => {});
            }
        }

        // ==================== IMAGE LOADING ====================
        function loadImage(url, timeout = 10000) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                let done = false;
                const timer = setTimeout(() => { if (!done) { done = true; reject(); } }, timeout);
                img.onload = () => { if (!done) { done = true; clearTimeout(timer); resolve(img); } };
                img.onerror = () => { if (!done) { done = true; clearTimeout(timer); reject(); } };
                img.crossOrigin = 'anonymous';
                img.src = url;
            });
        }

        async function loadAllImages() {
            const images = [];
            const progressEl = document.getElementById('load-progress');
            for (let i = 0; i < CARD_IMAGES.length; i++) {
                try {
                    const img = await loadImage(CARD_IMAGES[i]);
                    images.push(img);
                } catch (e) {
                    const canvas = document.createElement('canvas');
                    canvas.width = 512; canvas.height = 640;
                    const ctx = canvas.getContext('2d');
                    const gradient = ctx.createLinearGradient(0, 0, 512, 640);
                    gradient.addColorStop(0, CARD_COLORS[i % CARD_COLORS.length]);
                    gradient.addColorStop(0.5, adjustColor(CARD_COLORS[i % CARD_COLORS.length], 30));
                    gradient.addColorStop(1, CARD_COLORS[i % CARD_COLORS.length]);
                    ctx.fillStyle = gradient;
                    ctx.fillRect(0, 0, 512, 640);
                    ctx.fillStyle = 'rgba(255,255,255,0.1)';
                    for (let j = 0; j < 20; j++) {
                        ctx.beginPath();
                        ctx.arc(Math.random() * 512, Math.random() * 640, Math.random() * 50 + 10, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    images.push(canvas);
                }
                if (progressEl) progressEl.textContent = (i + 1) + ' / ' + CARD_IMAGES.length + ' images';
            }
            return images;
        }

        // ==================== THREE.JS SCENE ====================
        let scene, camera, renderer, sun, planets = [], starField, time = 0;

        function initThree(images) {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 20;
            camera.position.y = 5;
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const pointLight = new THREE.PointLight(0xffd700, 2.5, 50);
            pointLight.position.set(0, 0, 0);
            scene.add(pointLight);
            const rimLight = new THREE.DirectionalLight(0xffd700, 0.6);
            rimLight.position.set(5, 5, 5);
            scene.add(rimLight);
            const fillLight = new THREE.DirectionalLight(0xffaa00, 0.3);
            fillLight.position.set(-5, -3, 5);
            scene.add(fillLight);

            createSun();
            createPlanets(images);
            createStarfield();

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function createSun() {
            const geometry = new THREE.SphereGeometry(SUN_SIZE, 64, 64);
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            const texture = new THREE.CanvasTexture(canvas);

            const material = new THREE.MeshBasicMaterial({
                map: texture,
                emissive: 0xffd700,
                emissiveIntensity: 0.6
            });

            sun = new THREE.Mesh(geometry, material);
            scene.add(sun);

            function drawSun() {
                const t = Date.now() * 0.001;
                const gradient = ctx.createRadialGradient(256, 256, 0, 256, 256, 256);
                gradient.addColorStop(0, `hsl(${45 + Math.sin(t) * 8}, 100%, 75%)`);
                gradient.addColorStop(0.3, `hsl(${38 + Math.sin(t * 1.3) * 12}, 100%, 55%)`);
                gradient.addColorStop(0.6, `hsl(${28 + Math.sin(t * 0.7) * 15}, 100%, 42%)`);
                gradient.addColorStop(0.85, `hsl(${20 + Math.sin(t * 0.5) * 10}, 100%, 28%)`);
                gradient.addColorStop(1, '#000');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, 512, 512);
                for (let i = 0; i < 60; i++) {
                    const x = Math.random() * 512;
                    const y = Math.random() * 512;
                    const r = Math.random() * 35 + 8;
                    ctx.beginPath();
                    ctx.arc(x, y, r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, ${180 + Math.random() * 75}, ${Math.random() * 50}, ${Math.random() * 0.35})`;
                    ctx.fill();
                }
                texture.needsUpdate = true;
            }
            drawSun();
            setInterval(drawSun, 200);

            // Multiple glow layers for premium effect
            [1.3, 1.6, 2.0, 2.5].forEach((scale, idx) => {
                const glowGeometry = new THREE.SphereGeometry(SUN_SIZE * scale, 32, 32);
                const glowMaterial = new THREE.MeshBasicMaterial({
                    color: idx < 2 ? 0xffd700 : 0xff8c00,
                    transparent: true,
                    opacity: [0.25, 0.12, 0.06, 0.03][idx],
                    side: THREE.BackSide
                });
                sun.add(new THREE.Mesh(glowGeometry, glowMaterial));
            });
        }

        function createCardTexture(image, label, color) {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 640;
            const ctx = canvas.getContext('2d');

            // Premium card background with gold border effect
            const gradient = ctx.createLinearGradient(0, 0, 512, 640);
            gradient.addColorStop(0, color);
            gradient.addColorStop(0.5, adjustColor(color, 20));
            gradient.addColorStop(1, adjustColor(color, -30));
            ctx.fillStyle = gradient;
            roundRect(ctx, 0, 0, 512, 640, 30);
            ctx.fill();

            // Outer gold border
            ctx.strokeStyle = 'rgba(218, 165, 32, 0.6)';
            ctx.lineWidth = 6;
            roundRect(ctx, 3, 3, 506, 634, 27);
            ctx.stroke();

            // Inner elegant border
            ctx.strokeStyle = 'rgba(255, 248, 220, 0.4)';
            ctx.lineWidth = 3;
            roundRect(ctx, 12, 12, 488, 616, 22);
            ctx.stroke();

            // Photo frame background
            ctx.fillStyle = 'rgba(0,0,0,0.15)';
            roundRect(ctx, 30, 30, 452, 450, 20);
            ctx.fill();

            // Photo
            const imgW = image.width || 512;
            const imgH = image.height || 640;
            const imgAspect = imgW / imgH;
            const frameAspect = 452 / 450;
            let sx, sy, sWidth, sHeight;

            if (imgAspect > frameAspect) {
                sHeight = imgH; sWidth = imgH * frameAspect;
                sx = (imgW - sWidth) / 2; sy = 0;
            } else {
                sWidth = imgW; sHeight = imgW / frameAspect;
                sx = 0; sy = (imgH - sHeight) / 2;
            }

            ctx.save();
            roundRect(ctx, 30, 30, 452, 450, 20);
            ctx.clip();
            try { ctx.drawImage(image, sx, sy, sWidth, sHeight, 30, 30, 452, 450); }
            catch (e) { ctx.fillStyle = color; ctx.fillRect(30, 30, 452, 450); }
            ctx.restore();

            // Photo overlay gradient
            const overlayGrad = ctx.createLinearGradient(0, 350, 0, 480);
            overlayGrad.addColorStop(0, 'rgba(0,0,0,0)');
            overlayGrad.addColorStop(1, 'rgba(0,0,0,0.5)');
            ctx.fillStyle = overlayGrad;
            ctx.fillRect(30, 350, 452, 130);

            // Label with elegant typography
            ctx.font = 'bold 48px "Playfair Display", serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#FFF8DC';
            ctx.shadowColor = 'rgba(0,0,0,0.6)';
            ctx.shadowBlur = 20;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;
            ctx.fillText(label, 256, 555);

            // Decorative elements
            ctx.shadowColor = 'transparent';
            ctx.font = '22px serif';
            ctx.fillStyle = 'rgba(218, 165, 32, 0.6)';
            ctx.fillText('✦ ✦ ✦', 256, 610);

            // Corner decorations
            ctx.font = '36px serif';
            ctx.fillStyle = 'rgba(218, 165, 32, 0.35)';
            ctx.fillText('❖', 50, 70);
            ctx.fillText('❖', 462, 70);
            ctx.fillText('❖', 50, 600);
            ctx.fillText('❖', 462, 600);

            return new THREE.CanvasTexture(canvas);
        }

        function createPlanets(images) {
            images.forEach((image, i) => {
                const angle = (i / images.length) * Math.PI * 2;
                const radius = 8 + (i % 3) * 3;
                const speed = 0.25 + (i % 4) * 0.1;
                const tilt = (Math.random() - 0.5) * 0.6;

                const texture = createCardTexture(image, CARD_LABELS[i], CARD_COLORS[i]);
                const geometry = new THREE.PlaneGeometry(CARD_WIDTH, CARD_HEIGHT);
                const material = new THREE.MeshStandardMaterial({
                    map: texture,
                    emissive: new THREE.Color(CARD_COLORS[i]),
                    emissiveIntensity: 0.2,
                    roughness: 0.15,
                    metalness: 0.25,
                    side: THREE.DoubleSide
                });

                const card = new THREE.Mesh(geometry, material);
                const orbitContainer = new THREE.Object3D();
                orbitContainer.rotation.y = angle;
                orbitContainer.rotation.x = tilt;
                scene.add(orbitContainer);

                card.position.x = radius;
                orbitContainer.add(card);

                // Premium glow behind card
                const glowGeo = new THREE.PlaneGeometry(CARD_WIDTH * 1.15, CARD_HEIGHT * 1.12);
                const glowMat = new THREE.MeshBasicMaterial({
                    color: CARD_COLORS[i], transparent: true, opacity: 0.2, side: THREE.BackSide
                });
                const glow = new THREE.Mesh(glowGeo, glowMat);
                glow.position.z = -0.2;
                card.add(glow);

                // Elegant ring decoration
                if (i % 2 === 0) {
                    const ringGeo = new THREE.TorusGeometry(CARD_WIDTH * 0.6, 0.025, 8, 64);
                    const ringMat = new THREE.MeshBasicMaterial({
                        color: CARD_COLORS[i], transparent: true, opacity: 0.35
                    });
                    const ring = new THREE.Mesh(ringGeo, ringMat);
                    ring.rotation.x = Math.PI / 2;
                    card.add(ring);
                }

                planets.push({
                    mesh: card, container: orbitContainer, speed: speed,
                    floatSpeed: BOB_SPEED + Math.random() * 0.5,
                    floatAmp: BOB_HEIGHT + Math.random() * 0.3,
                    rotationOffset: Math.random() * Math.PI * 2
                });
            });
        }

        function createStarfield() {
            const geometry = new THREE.BufferGeometry();
            const count = 3000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);

            for (let i = 0; i < count; i++) {
                const r = 20 + Math.random() * 80;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                positions[i * 3 + 2] = r * Math.cos(phi);
                const color = new THREE.Color();
                // Warm gold and cool white stars
                const hue = Math.random() > 0.6 ? 0.12 : (Math.random() > 0.5 ? 0.6 : 0.0);
                color.setHSL(hue, 0.7, 0.85);
                colors[i * 3] = color.r;
                colors[i * 3 + 1] = color.g;
                colors[i * 3 + 2] = color.b;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.18, vertexColors: true, transparent: true, opacity: 0.85, blending: THREE.AdditiveBlending
            });

            starField = new THREE.Points(geometry, material);
            scene.add(starField);
        }

        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;

            if (sun) {
                sun.rotation.y += SUN_SPEED;
                sun.rotation.x += SUN_SPEED * 0.4;
            }

            planets.forEach((planet, i) => {
                planet.container.rotation.y += planet.speed * ORBIT_SPEED;
                planet.mesh.position.y = Math.sin(time * planet.floatSpeed + planet.rotationOffset) * planet.floatAmp;
                planet.mesh.rotation.z = Math.sin(time * 0.5 + planet.rotationOffset) * 0.05;
                planet.mesh.lookAt(camera.position);
                planet.mesh.rotateY(Math.sin(time * 0.4 + i) * 0.1);
            });

            if (starField) {
                starField.rotation.y += STAR_SPEED;
                starField.rotation.x += STAR_SPEED * 0.5;
            }

            const dolly = Math.sin(time * 0.15) * 2.5;
            camera.position.x = Math.sin(time * CAMERA_SPEED) * 3;
            camera.position.z = 20 + Math.cos(time * CAMERA_SPEED * 0.7) * 2 + dolly;
            camera.position.y = 5 + Math.cos(time * CAMERA_SPEED * 0.6) * 1.5;
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            if (!camera || !renderer) return;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ==================== CONFETTI ====================
        const confettiCanvas = document.getElementById('confetti');
        const confettiCtx = confettiCanvas.getContext('2d');
        let confettiParticles = [];

        function resizeConfetti() {
            confettiCanvas.width = window.innerWidth;
            confettiCanvas.height = window.innerHeight;
        }
        resizeConfetti();
        window.addEventListener('resize', resizeConfetti);

        class Confetti {
            constructor(burst = false) {
                this.x = burst ? confettiCanvas.width / 2 + (Math.random() - 0.5) * 100 : Math.random() * confettiCanvas.width;
                this.y = burst ? confettiCanvas.height / 2 + (Math.random() - 0.5) * 100 : -10;
                this.size = Math.random() * 10 + 5;
                this.speedY = burst ? (Math.random() - 0.5) * 15 : Math.random() * 3 + 2;
                this.speedX = burst ? (Math.random() - 0.5) * 15 : (Math.random() - 0.5) * 2;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = (Math.random() - 0.5) * 10;
                // Gold and warm tones for confetti
                const goldHues = [45, 50, 35, 30, 55, 40];
                this.color = `hsl(${goldHues[Math.floor(Math.random() * goldHues.length)]}, ${70 + Math.random() * 30}%, ${50 + Math.random() * 30}%)`;
                this.shape = Math.random() > 0.5 ? 'rect' : 'circle';
                this.life = burst ? 120 : Infinity;
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX + Math.sin(this.y * 0.01);
                this.rotation += this.rotationSpeed;
                if (this.life !== Infinity) this.life--;
                if (this.life < 20) return false;
                if (this.life === Infinity && this.y > confettiCanvas.height + 10) {
                    this.y = -10;
                    this.x = Math.random() * confettiCanvas.width;
                }
                return true;
            }
            draw() {
                confettiCtx.save();
                confettiCtx.translate(this.x, this.y);
                confettiCtx.rotate(this.rotation * Math.PI / 180);
                confettiCtx.fillStyle = this.color;
                if (this.shape === 'rect') {
                    confettiCtx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size * 0.6);
                } else {
                    confettiCtx.beginPath();
                    confettiCtx.arc(0, 0, this.size / 2, 0, Math.PI * 2);
                    confettiCtx.fill();
                }
                confettiCtx.restore();
            }
        }

        function initConfetti() {
            for (let i = 0; i < 150; i++) confettiParticles.push(new Confetti());
            function loop() {
                confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
                confettiParticles = confettiParticles.filter(p => p.update());
                confettiParticles.forEach(p => p.draw());
                requestAnimationFrame(loop);
            }
            loop();
        }

        function burstConfetti() {
            for (let i = 0; i < 50; i++) confettiParticles.push(new Confetti(true));
            if (audioCtx) {
                [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                    setTimeout(() => playTone(freq, 'sine', 0.5, 0.15), i * 100);
                });
            }
            spawnEmojis();
        }

        function spawnEmojis() {
            const emojis = ['🎉', '🎂', '🎁', '🎈', '✨', '🌟', '🍰', '🎊', '💫', '⭐'];
            for (let i = 0; i < 15; i++) {
                const el = document.createElement('div');
                el.className = 'emoji-float';
                el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                el.style.left = Math.random() * 100 + 'vw';
                el.style.animationDuration = (3 + Math.random() * 2) + 's';
                el.style.fontSize = (1.5 + Math.random() * 2) + 'rem';
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 5000);
            }
        }

        // ==================== FLOATING PARTICLES ====================
        function initParticles() {
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 4 + 2;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (8 + Math.random() * 12) + 's';
                p.style.animationDelay = Math.random() * 10 + 's';
                document.body.appendChild(p);
            }
        }

        // ==================== UTILITIES ====================
        function adjustColor(hex, amount) {
            const num = parseInt(hex.replace('#', ''), 16);
            const r = Math.max(0, Math.min(255, (num >> 16) + amount));
            const g = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF) + amount));
            const b = Math.max(0, Math.min(255, (num & 0x0000FF) + amount));
            return `rgb(${r},${g},${b})`;
        }

        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        // ==================== MAIN START ====================
        let experienceStarted = false;

        async function startExperience() {
            if (experienceStarted) return;
            experienceStarted = true;

            document.getElementById('start-overlay').classList.add('hidden');
            const loading = document.getElementById('loading');
            loading.classList.add('visible');

            videoEl.muted = true;
            videoEl.loop = true;
            videoEl.play().catch(e => console.log('Video autoplay blocked'));

            let images;
            try { images = await loadAllImages(); }
            catch (e) {
                images = [];
                for (let i = 0; i < 8; i++) {
                    const canvas = document.createElement('canvas');
                    canvas.width = 512; canvas.height = 640;
                    const ctx = canvas.getContext('2d');
                    const gradient = ctx.createLinearGradient(0, 0, 512, 640);
                    gradient.addColorStop(0, CARD_COLORS[i]);
                    gradient.addColorStop(1, adjustColor(CARD_COLORS[i], -40));
                    ctx.fillStyle = gradient;
                    ctx.fillRect(0, 0, 512, 640);
                    images.push(canvas);
                }
            }

            loading.classList.add('hidden');
            initAudio();
            startMusic();
            initThree(images);
            initConfetti();
            initParticles();

            setTimeout(burstConfetti, 500);
            setTimeout(burstConfetti, 1500);
            setInterval(spawnEmojis, 8000);
        }

        // Mouse interaction
        const uiTilt = document.getElementById('ui-tilt');
        document.addEventListener('mousemove', (e) => {
            const nx = (e.clientX / window.innerWidth - 0.5) * 2;
            const ny = (e.clientY / window.innerHeight - 0.5) * 2;
            if (uiTilt) {
                const rotY = nx * 8;
                const rotX = -ny * 6;
                uiTilt.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) translateZ(0)`;
            }
            if (!camera) return;
            const targetX = Math.sin(time * CAMERA_SPEED) * 3 + nx * 1.5;
            const targetY = 5 + Math.cos(time * CAMERA_SPEED * 0.6) * 1.5 + ny * 0.8;
            camera.position.x += (targetX - camera.position.x) * 0.05;
            camera.position.y += (targetY - camera.position.y) * 0.05;
        });

        document.addEventListener('touchmove', (e) => {
            if (!e.touches[0]) return;
            const nx = (e.touches[0].clientX / window.innerWidth - 0.5) * 2;
            const ny = (e.touches[0].clientY / window.innerHeight - 0.5) * 2;
            if (uiTilt) uiTilt.style.transform = `rotateX(${-ny*6}deg) rotateY(${nx*8}deg)`;
        }, { passive: true });

        document.addEventListener('click', (e) => {
            if (!experienceStarted || e.target.closest('.control-btn')) return;
            if (Math.random() > 0.8) burstConfetti();
        });
    </script>
</body>
